<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibrant To-Do Galaxy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="app">
    <div id="dashboardGrid" style="display:grid; grid-template-columns: 1fr; gap:0; align-items:stretch; min-height: calc(100vh - 40px); transition:all 0.6s ease;">
      
      <div id="leftPanel" style="grid-column:1; grid-row:1; display:flex; flex-direction:column; align-items:stretch; justify-content:flex-start; gap:20px; width:100%; max-width:520px; height: calc(100vh - 40px); margin:0 auto; padding-right:8px; transition:all 0.6s ease;">
      
        <div style="padding:18px 20px; border-radius:30px; background:linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.05)); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.16); box-shadow: inset 0 1px 0 rgba(255,255,255,0.25); display:flex; align-items:center; justify-content:space-between; gap:16px;">
          <h1 style="margin:0;">To-Do Galaxy</h1>
          <button id="darkIconBtn" onclick="toggleDarkMode(); animateDarkIcon()" style="width:48px; height:48px; border-radius:50%; padding:0; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, rgba(255,255,255,0.18), rgba(123,97,255,0.25)); border:1px solid rgba(255,255,255,0.18); box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 0 18px rgba(123,97,255,0.18); font-size:1.2rem;">🌙</button>
        </div>

        <div id="welcomePanel" style="display:none; padding:24px; border-radius:32px; background:linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.05)); backdrop-filter:blur(22px) saturate(160%); -webkit-backdrop-filter:blur(22px) saturate(160%); border:1px solid rgba(255,255,255,0.16); min-height:140px; align-items:center; justify-content:center; font-family:'Gabriola', 'Times New Roman', serif; font-size:1.6rem; line-height:1.7; letter-spacing:0.6px; text-align:center;"><div id="welcomeText"></div></div>
        
        <div id="inputPanel" style="padding:20px; border-radius:32px; background:linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.05)); backdrop-filter:blur(22px) saturate(160%); -webkit-backdrop-filter:blur(22px) saturate(160%); border:1px solid rgba(255,255,255,0.16);">
          <div class="input-box" style="gap:14px;">
            <input type="text" id="taskInput" placeholder="Add your cosmic task..." />
            <button onclick="addTask()">Add Task</button>
          </div>
          <button id="clearAllBtn" onclick="clearAllTasks()" style="width:100%; margin:0 0 16px 0; background:linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06)); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.16); box-shadow: inset 0 1px 0 rgba(255,255,255,0.18); color:white;">Delete All</button>
          
          <div id="optionsPanel" style="display:none; margin-top:14px; padding:12px; border-radius:18px; background:linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03)); border:1px solid rgba(255,255,255,0.14); box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);">
            <div class="filters" style="display:grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr) auto; gap:10px; align-items:center; width:100%;">
            <label style="font-size:0.9rem; display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 12px; border-radius:12px; background:linear-gradient(45deg, #ff4ecd, #7b61ff); cursor:pointer; font-weight:600; min-width:0; width:100%;">
              <span id="timestampLabel" style="display:inline-block; font-size:0.82rem; letter-spacing:0.3px; opacity:1; transition:opacity .3s ease;">Timestamp</span>
              <input class="toggle-switch" type="checkbox" id="toggleTimestamp" checked onchange="document.getElementById('timestampLabel').style.opacity=this.checked?'1':'0.45'; renderTasks()">
            </label>
            <label style="font-size:0.9rem; display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 12px; border-radius:12px; background:linear-gradient(45deg, #ff4ecd, #7b61ff); cursor:pointer; font-weight:600; min-width:0; width:100%;">
              <span id="taskbarLabel" style="display:inline-block; font-size:0.82rem; letter-spacing:0.3px; opacity:1; transition:opacity .3s ease;">Taskbar</span>
              <input class="toggle-switch" type="checkbox" id="toggleTaskbar" checked onchange="document.getElementById('taskbarLabel').style.opacity=this.checked?'1':'0.45'; renderTasks()">
            </label>
            <button class="small-btn" onclick="sortTasksAZ()" style="min-width:80px; padding:10px 16px; justify-self:end;">Sort A-Z</button>
            </div>
          </div>
        </div>

        <div id="taskSummaryBar" style="display:none; margin-top:auto; padding:22px; border-radius:22px; background:linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04)); border:1px solid rgba(255,255,255,0.18); box-shadow:0 10px 30px rgba(0,0,0,0.18);">
          <div style="display:flex; flex-direction:column; align-items:stretch; gap:22px; width:100%;">
            <div style="display:flex; gap:18px; flex:1; align-items:stretch;">
              <div id="pendingCard" style="flex:1; padding:14px; border-radius:18px; background:linear-gradient(135deg, rgba(255,255,255,0.16), rgba(255,255,255,0.06)); backdrop-filter:blur(18px); text-align:center; min-width:120px;">
                <div style="font-size:0.8rem; opacity:0.8;">Pending</div>
                <div id="pendingCount" style="font-size:1.8rem; font-weight:700; margin-top:4px;">0</div>
              </div>
              <div style="flex:1; padding:14px; border-radius:18px; background:linear-gradient(135deg, rgba(255,255,255,0.16), rgba(255,255,255,0.06)); backdrop-filter:blur(18px); text-align:center; min-width:120px;">
                <div style="font-size:0.8rem; opacity:0.8;">Completed</div>
                <div id="completedCount" style="font-size:1.8rem; font-weight:700; margin-top:4px;">0</div>
              </div>
            </div>
            <div style="display:flex; align-items:center; justify-content:center; gap:24px; width:100%; padding-top:4px;">
            <div style="position:relative; width:110px; height:110px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.04)); backdrop-filter:blur(18px); border:1px solid rgba(255,255,255,0.18); box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), 0 10px 24px rgba(0,0,0,0.18);" id="progressRing">
              <div style="width:82px; height:82px; border-radius:50%; background:linear-gradient(135deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05)); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.14); display:flex; align-items:center; justify-content:center; font-weight:700;"><span id="progressLabel">0%</span></div>
            </div>
            <div id="clockCircle" style="width:140px; height:140px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(135deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05)); border:1px solid rgba(255,255,255,0.18);">
              <div id="stopwatchText" style="font-size:1.25rem; font-weight:700;">00:00</div>
              <div style="display:flex; gap:8px; margin-top:12px;">
                <button class="small-btn" onclick="toggleStopwatch()">⏯</button>
                <button class="small-btn" onclick="resetStopwatch()">↺</button>
              </div>
            </div>
            </div>
          </div>
        </div>
      </div>

      <div id="taskBoard" style="grid-column:2; grid-row:1; display:none; padding:28px; border-radius:32px; background:linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.05)); backdrop-filter:blur(22px) saturate(160%); border:1px solid rgba(255,255,255,0.12); border-left:none; box-shadow:0 10px 30px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.22); height: calc(100vh - 40px); align-self:stretch;">
        <div id="taskColumns" class="task-columns" style="display:grid; grid-template-columns:1fr; gap:14px; height:100%; min-height:100%; align-content:stretch; align-items:stretch;">
          <div id="tasksSection" style="display:none; height:100%; display:flex; flex-direction:column;">
            <h3 style="margin:6px 0 10px; font-size:1rem;">Tasks</h3>
            <ul id="pendingList"></ul>
          </div>
          <div id="completedSection" style="display:none; height:100%; display:flex; flex-direction:column;">
            <h3 style="margin:6px 0 10px; font-size:1rem;">Completed</h3>
            <ul id="completedList"></ul>
          </div>
        </div>
      </div>
      
    </div>
    <div id="confettiBurst" class="confetti-burst"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
